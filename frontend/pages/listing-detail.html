<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- PWA / installable mobile -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#f26522">
  <link rel="icon" href="/assets/icons/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/assets/icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pro Market">
  <title>Annonce — Pro Market Algérie</title>
  <meta name="description" content="Détail d'une annonce d'équipement professionnel ou fonds de commerce en Algérie. Contactez directement le vendeur sur Pro Market Algérie.">
  <meta property="og:title" content="Annonce — Pro Market Algérie">
  <meta property="og:description" content="Détail d'une annonce d'équipement professionnel ou fonds de commerce en Algérie. Contactez directement le vendeur sur Pro Market Algérie.">
  <meta property="og:type" content="article">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" crossorigin="anonymous">
  <style>
    /* Stabilise les 4 boutons de la barre « Mode Admin » (Approuver / Rejeter /
       Boost / Supprimer). animations.css (chargé après main.css) leur impose une
       transition « all » rebondissante (overshoot), un halo ::before qui gonfle à
       300 % au survol et un scale(0.96) au clic — ce qui déformait visiblement les
       boutons. On neutralise ces effets tout en gardant le feedback couleur/ombre. */
    #admin-toolbar .btn {
      transition-property: background-color, background-position, box-shadow, color, border-color, opacity;
      transition-duration: 0.15s;
      transition-timing-function: ease;
    }
    #admin-toolbar .btn::before { display: none !important; }
    #admin-toolbar .btn:hover,
    #admin-toolbar .btn:active { transform: none !important; }

    /* Boutons « Appeler le vendeur » / « Contacter sur WhatsApp ».
       animations.css impose aux .btn une transition « all » à ressort
       (cubic-bezier overshoot) + un scale(0.96) au clic qui « rebondit » au-delà
       de 100 % au relâchement + un halo ::before qui gonfle à 300 %. Résultat :
       au tap le bouton s'agrandissait verticalement puis se repliait, et changeait
       de forme. On verrouille ici TOUT mouvement pour qu'il reste strictement fixe :
         • transition limitée à la couleur/ombre (jamais transform/largeur/hauteur) ;
         • aucune transformation au survol / clic / focus ;
         • halo ::before et toute animation désactivés ;
         • hauteur figée (min-height = hauteur d'un btn-lg) pour qu'afficher le
           numéro ne modifie jamais la taille.
       !important pour battre la règle .btn d'animations.css chargé après main.css. */
    #btn-call, #btn-whatsapp {
      transition: background-color 0.15s ease, box-shadow 0.15s ease,
                  color 0.15s ease, filter 0.15s ease !important;
      animation: none !important;
      min-height: 50px;
      white-space: nowrap;
      overflow: hidden;
    }
    #btn-call::before, #btn-whatsapp::before { content: none !important; display: none !important; }
    #btn-call:hover, #btn-call:active, #btn-call:focus,
    #btn-whatsapp:hover, #btn-whatsapp:active, #btn-whatsapp:focus {
      transform: none !important;
    }
    /* Supprime le <span class="ripple"> injecté par initRippleEffect() au clic :
       c'est lui qui étirait le bouton vers le bas puis le repliait. Ces boutons
       restent ainsi 100 % fixes (aucune onde, aucun changement de taille). */
    #btn-call .ripple, #btn-whatsapp .ripple { display: none !important; }
  </style>
</head>
<body>
<div id="site-header"></div>

<!-- Loading state OUTSIDE page-wrapper so it's visible immediately -->
<div id="loading-state" style="text-align:center;padding:80px">
  <div class="spinner" style="width:48px;height:48px;border-color:var(--orange);border-top-color:transparent;margin:0 auto 20px"></div>
  <p style="color:var(--gray-600)">Chargement de l'annonce…</p>
</div>

<div class="page-wrapper">
<div class="container" style="padding-top:24px">

  <div id="error-state" class="empty-state" style="display:none">
    <i class="fas fa-exclamation-circle" style="color:var(--red)"></i>
    <p>Annonce introuvable ou expirée.</p>
    <a href="../index.html" class="btn btn-outline-orange mt-3">Retour à l'accueil</a>
  </div>

  <!-- Detail layout (populated after load) -->
  <!-- Admin toolbar (only if ?admin=1) -->
  <div id="admin-toolbar" style="display:none;margin-bottom:20px;background:#fff;border-radius:var(--r-lg);padding:16px;border-left:4px solid var(--orange)">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="font-weight:700;color:var(--orange)"><i class="fas fa-shield-alt"></i> Mode Admin</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-left:auto">
        <button class="btn btn-green btn-sm" onclick="adminApprove()"><i class="fas fa-check"></i> Approuver</button>
        <button class="btn btn-sm" style="background:var(--red);color:#fff;border:2px solid var(--red)" onclick="adminReject()"><i class="fas fa-times"></i> Rejeter</button>
        <button class="btn btn-blue btn-sm" style="background:var(--blue);color:#fff" onclick="adminBoost()"><i class="fas fa-star"></i> Boost</button>
        <button class="btn btn-sm" style="background:var(--red);color:#fff;border:2px solid var(--red)" onclick="adminDelete()"><i class="fas fa-trash"></i> Supprimer</button>
      </div>
    </div>
  </div>

  <div id="detail-layout" class="listing-detail-layout" style="display:none">
    <!-- LEFT: Gallery + Info -->
    <div>
      <!-- Gallery -->
      <div class="listing-gallery" id="gallery-wrap">
        <div class="gallery-main">
          <img id="main-img" src="" alt="">
          <button type="button" class="gallery-nav gallery-prev" id="gallery-prev" onclick="prevImg()" aria-label="Image précédente" style="display:none">
            <i class="fas fa-chevron-left"></i>
          </button>
          <button type="button" class="gallery-nav gallery-next" id="gallery-next" onclick="nextImg()" aria-label="Image suivante" style="display:none">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
        <div class="gallery-thumbs" id="thumbs"></div>
      </div>

      <!-- Description -->
      <div style="background:#fff;border-radius:var(--r-lg);padding:24px;margin-top:20px">
        <h2 style="font-size:1.05rem;color:var(--blue);margin-bottom:12px">Description</h2>
        <div id="description" style="font-size:15px;line-height:1.7;color:var(--dark)"></div>
      </div>

      <!-- Technical attributes -->
      <div style="background:#fff;border-radius:var(--r-lg);padding:24px;margin-top:16px">
        <h2 style="font-size:1.05rem;color:var(--blue);margin-bottom:12px">Fiche technique</h2>
        <table class="listing-attrs-table" id="attrs-table"><tbody></tbody></table>
      </div>
    </div>

    <!-- RIGHT: Contact sidebar -->
    <div>
      <!-- Price + title -->
      <div style="background:#fff;border-radius:var(--r-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm)">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px" id="listing-badges"></div>
        <h1 class="listing-title" id="listing-title"></h1>
        <div id="listing-price"></div>
        <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:10px" id="listing-meta"></div>
      </div>

      <!-- Contact sidebar -->
      <div class="contact-sidebar">
        <div class="seller-info">
          <div class="seller-avatar placeholder" id="seller-avatar-placeholder">?</div>
          <div>
            <div style="font-weight:700" id="seller-name"></div>
            <div style="font-size:12px;color:var(--gray-600)" id="seller-type"></div>
            <div id="seller-certified-badge"></div>
          </div>
        </div>
        <div id="seller-stats" style="font-size:12px;color:var(--gray-600);margin-bottom:16px"></div>

        <div class="contact-btn-group">
          <button class="btn btn-call btn-lg btn-block" id="btn-call" onclick="revealPhone()">
            <i class="fas fa-phone"></i> Appeler le vendeur
          </button>
          <button class="btn btn-whatsapp btn-lg btn-block" id="btn-whatsapp" onclick="openWhatsApp()">
            <i class="fab fa-whatsapp"></i> Contacter sur WhatsApp
          </button>
        </div>

        <div style="margin-top:16px;padding-top:16px;border-top:2px solid var(--gray-200)">
          <div style="font-size:12px;color:var(--gray-600);display:flex;align-items:center;gap:6px">
            <i class="fas fa-shield-alt" style="color:var(--blue)"></i>
            Coordonnées masquées — dévoilées uniquement sur demande
          </div>
        </div>
      </div>

      <!-- Share -->
      <div style="background:#fff;border-radius:var(--r-lg);padding:16px;margin-top:16px;box-shadow:var(--shadow-sm)">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--gray-600)">Partager</div>
        <div style="display:flex;gap:8px">
          <a onclick="shareFB()" href="#" class="btn btn-sm" style="background:#1877f2;color:#fff;flex:1;justify-content:center"><i class="fab fa-facebook"></i> Facebook</a>
          <a onclick="shareWA()" href="#" class="btn btn-sm" style="background:#25D366;color:#fff;flex:1;justify-content:center"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
      </div>
    </div>
  </div>
</div><!-- /.container -->

<div id="site-footer"></div>

</div><!-- /.page-wrapper -->

<script src="../js/api.js"></script>
<script src="../js/main.js"></script>
<script>
  const listingId = new URLSearchParams(location.search).get('id');
  const isAdminMode = new URLSearchParams(location.search).get('admin') === '1';
  let listing = null;
  let phoneRevealed = null;
  let galleryMedia = [];
  let currentImgIndex = 0;

  if (isAdminMode) {
    document.getElementById('admin-toolbar').style.display = '';
  }

  async function loadListing() {
    if (!listingId) { showError(); return; }
    try {
      listing = await ListingsAPI.get(listingId);
      renderDetail(listing);
    } catch {
      showError();
    }
  }

  function showError() {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display = '';
  }

  function renderDetail(l) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('detail-layout').style.display = '';
    document.title = `${l.title_fr} — Pro Market Algérie`;

    // Gallery
    if (l.media?.length) {
      galleryMedia = l.media;
      const coverIdx = l.media.findIndex(m => m.is_cover);
      currentImgIndex = coverIdx >= 0 ? coverIdx : 0;
      document.getElementById('main-img').alt = l.title_fr || '';
      document.getElementById('thumbs').innerHTML = l.media.map((m, i) => `
        <img src="${escapeHtml(m.url_thumb || m.url)}" alt="" onclick="showImage(${i})">
      `).join('');
      // Boutons de navigation : visibles seulement s'il y a plusieurs images
      const navDisplay = l.media.length > 1 ? 'flex' : 'none';
      document.getElementById('gallery-prev').style.display = navDisplay;
      document.getElementById('gallery-next').style.display = navDisplay;
      showImage(currentImgIndex);
    } else {
      document.getElementById('gallery-wrap').innerHTML = '<div style="aspect-ratio:4/3;min-height:200px;background:var(--gray-200);display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--gray-400)"><i class="fas fa-image"></i></div>';
    }

    // Title + price
    document.getElementById('listing-title').textContent = l.title_fr;
    document.getElementById('listing-price').innerHTML = formatPrice(l.price, l.currency, l.price_on_contact);

    // Badges
    const badges = [];
    if (l.is_boosted) badges.push('<span class="badge badge-orange">Top annonce</span>');
    if (l.is_premium) badges.push('<span class="badge badge-premium">Premium</span>');
    document.getElementById('listing-badges').innerHTML = badges.join('');

    // Meta
    document.getElementById('listing-meta').innerHTML = [
      l.wilaya_name ? `<span style="font-size:13px;color:var(--gray-600)"><i class="fas fa-map-marker-alt" style="color:var(--orange)"></i> ${escapeHtml(l.wilaya_name)}${l.commune ? ', ' + escapeHtml(l.commune) : ''}</span>` : '',
      l.year        ? `<span style="font-size:13px;color:var(--gray-600)"><i class="fas fa-calendar"></i> ${l.year}</span>` : '',
      l.brand       ? `<span style="font-size:13px;color:var(--gray-600)"><i class="fas fa-tag"></i> ${escapeHtml(l.brand)}</span>` : '',
      l.condition   ? `<span style="font-size:13px;color:var(--gray-600)"><i class="fas fa-star"></i> ${escapeHtml(l.condition)}</span>` : '',
      `<span style="font-size:13px;color:var(--gray-600)"><i class="fas fa-eye"></i> ${l.view_count} vues</span>`,
      `<span style="font-size:13px;color:var(--gray-600)"><i class="fas fa-clock"></i> ${timeAgo(l.created_at)}</span>`,
    ].filter(Boolean).join('');

    // Description
    document.getElementById('description').innerHTML = l.description_fr
      ? escapeHtml(l.description_fr).replace(/\n/g, '<br>')
      : '<span style="color:var(--gray-400)">Aucune description fournie.</span>';

    // Attributes table
    let attrs = l.attributes || {};
    if (typeof attrs === 'string') {
      try { attrs = JSON.parse(attrs); } catch { attrs = {}; }
    }
    const rows = Object.entries(attrs).map(([k, v]) => `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(String(v))}</td></tr>`);
    if (l.brand)  rows.unshift(`<tr><td>Marque</td><td>${escapeHtml(l.brand)}</td></tr>`);
    if (l.year)   rows.unshift(`<tr><td>Année</td><td>${l.year}</td></tr>`);
    if (l.condition) rows.unshift(`<tr><td>État</td><td>${escapeHtml(l.condition)}</td></tr>`);
    document.querySelector('#attrs-table tbody').innerHTML = rows.length
      ? rows.join('')
      : '<tr><td colspan="2" style="text-align:center;color:var(--gray-400)">Aucun attribut technique renseigné</td></tr>';

    // Seller
    const sellerInitial = (l.seller_name || '?')[0].toUpperCase();
    const avatarEl = document.getElementById('seller-avatar-placeholder');
    if (l.logo_url) {
      avatarEl.outerHTML = `<img class="seller-avatar" id="seller-avatar-placeholder" src="${escapeHtml(l.logo_url)}" alt="">`;
    } else {
      avatarEl.textContent = sellerInitial;
    }
    document.getElementById('seller-name').textContent = l.company_name || l.seller_name || 'Vendeur';
    document.getElementById('seller-type').textContent = l.account_type === 'professional' ? 'Vendeur professionnel' : 'Vendeur particulier';
    if (l.seller_certified) {
      document.getElementById('seller-certified-badge').innerHTML = '<span class="badge badge-blue" style="margin-top:4px"><i class="fas fa-shield-alt"></i> Certifié</span>';
    }
    document.getElementById('seller-stats').innerHTML =
      `Membre depuis ${formatDate(l.seller_since)} · ${l.seller_listings_count || 0} annonces actives`;
  }

  function showImage(i) {
    if (!galleryMedia.length) return;
    // Index circulaire : revient au début/fin en bout de liste
    currentImgIndex = (i + galleryMedia.length) % galleryMedia.length;
    const m = galleryMedia[currentImgIndex];
    document.getElementById('main-img').src = m.url;
    document.querySelectorAll('#thumbs img').forEach((img, idx) =>
      img.classList.toggle('active', idx === currentImgIndex));
  }
  function prevImg() { showImage(currentImgIndex - 1); }
  function nextImg() { showImage(currentImgIndex + 1); }

  // Navigation au clavier (flèches gauche/droite)
  document.addEventListener('keydown', (e) => {
    if (galleryMedia.length < 2) return;
    if (e.key === 'ArrowLeft')  prevImg();
    if (e.key === 'ArrowRight') nextImg();
  });

  async function revealPhone() {
    if (phoneRevealed) {
      window.location.href = `tel:${phoneRevealed}`;
      return;
    }
    try {
      const data = await ListingsAPI.revealPhone(listingId);
      phoneRevealed = data.phone;
      const btn = document.getElementById('btn-call');
      btn.innerHTML = `<i class="fas fa-phone"></i> ${escapeHtml(data.phone)}`;
      btn.onclick = () => window.location.href = `tel:${data.phone}`;
      showToast('Numéro révélé !', 'success');
    } catch {
      showToast('Impossible d\'afficher le numéro.', 'error');
    }
  }

  async function openWhatsApp() {
    if (!phoneRevealed) {
      try {
        const data = await ListingsAPI.revealPhone(listingId);
        phoneRevealed = data.phone;
      } catch { showToast('Impossible d\'obtenir le numéro.', 'error'); return; }
    }
    window.open(whatsappUrl(phoneRevealed, listing?.title_fr || ''), '_blank');
  }

  function shareFB()  { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`, '_blank'); return false; }
  function shareWA()  { window.open(`https://wa.me/?text=${encodeURIComponent(listing?.title_fr + ' — ' + location.href)}`, '_blank'); return false; }

  async function adminApprove() {
    try { await apiFetch(`/admin/listings/${listingId}/approve`, { method: 'PATCH' }); showToast('Annonce approuvée.', 'success'); } catch { showToast('Erreur.', 'error'); }
  }
  async function adminReject() {
    const reason = await uiPrompt('Indiquez la raison du rejet (visible en interne) :', { title: 'Rejeter l’annonce', placeholder: 'Ex : photos non conformes', confirmText: 'Rejeter' });
    if (!reason) return;
    try { await apiFetch(`/admin/listings/${listingId}/reject`, { method: 'PATCH', body: JSON.stringify({ reason }) }); showToast('Annonce rejetée.', 'info'); } catch { showToast('Erreur.', 'error'); }
  }
  async function adminBoost() {
    const days = await uiPrompt('Combien de jours doit durer le boost ?', { title: 'Booster l’annonce', type: 'number', defaultValue: '7', confirmText: 'Booster' });
    if (!days) return;
    try { await apiFetch(`/admin/listings/${listingId}/boost`, { method: 'PATCH', body: JSON.stringify({ days: parseInt(days), is_premium: true }) }); showToast('Boost activé.', 'success'); } catch { showToast('Erreur.', 'error'); }
  }
  async function adminDelete() {
    if (!await uiConfirm('Cette annonce sera supprimée définitivement. Action irréversible.', { title: 'Supprimer l’annonce', danger: true, confirmText: 'Supprimer' })) return;
    try {
      await apiFetch(`/admin/listings/${listingId}`, { method: 'DELETE' });
      showToast('Annonce supprimée.', 'info');
      setTimeout(() => { window.location.href = 'admin.html'; }, 1000);
    } catch { showToast('Erreur.', 'error'); }
  }

  loadListing();
</script>
</body>
</html>
