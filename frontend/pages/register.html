<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Inscription — Pro Market Algérie</title>
  <meta name="description" content="Créez votre compte Pro Market Algérie pour acheter et vendre des équipements professionnels et fonds de commerce en Algérie.">
  <meta property="og:title" content="Inscription — Pro Market Algérie">
  <meta property="og:description" content="Créez votre compte Pro Market Algérie pour acheter et vendre des équipements professionnels et fonds de commerce en Algérie.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" crossorigin="anonymous">
</head>
<body>
<div id="site-header"></div>

<div class="page-wrapper">

<div style="min-height:calc(100vh - 200px);display:flex;align-items:center;padding:40px 16px">
  <div class="form-card" style="max-width:560px;width:100%">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:2.5rem;color:var(--blue);margin-bottom:8px"><i class="fas fa-user-plus"></i></div>
      <h2>Créer un compte</h2>
      <p style="color:var(--gray-600);font-size:14px">Rejoignez la marketplace B2B de référence en Algérie</p>
    </div>

    <!-- Account type selector -->
    <div class="account-type-grid" style="margin-bottom:24px">
      <button type="button" class="account-type-btn active" id="btn-individual" onclick="setAccountType('individual')">
        <i class="fas fa-user" style="font-size:1.4rem;color:var(--blue)"></i>
        <div style="font-weight:700;margin-top:6px">Particulier</div>
        <div style="font-size:12px;color:var(--gray-600)">Acheteur / vendeur ponctuel</div>
      </button>
      <button type="button" class="account-type-btn" id="btn-professional" onclick="setAccountType('professional')">
        <i class="fas fa-building" style="font-size:1.4rem;color:var(--orange)"></i>
        <div style="font-weight:700;margin-top:6px">Professionnel</div>
        <div style="font-size:12px;color:var(--gray-600)">Entreprise / concessionnaire</div>
      </button>
    </div>

    <form id="register-form">
      <input type="hidden" id="account_type" value="individual">

      <div class="form-row">
        <div class="form-group">
          <label>Nom complet <span class="required">*</span></label>
          <input type="text" id="full_name" class="form-control" placeholder="Prénom NOM" required>
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" id="phone" class="form-control" placeholder="+213 5X XXX XXXX">
        </div>
      </div>

      <div class="form-group" id="company-group" style="display:none">
        <label>Nom de l'entreprise <span class="required">*</span></label>
        <input type="text" id="company_name" class="form-control" placeholder="Raison sociale">
      </div>

      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="votre@email.com" required autocomplete="email">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Mot de passe <span class="required">*</span></label>
          <div style="position:relative">
            <input type="password" id="password" class="form-control" placeholder="Min. 8 caractères" required autocomplete="new-password">
            <button type="button" onclick="togglePwd('password','eye1')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--gray-400)">
              <i class="fas fa-eye" id="eye1"></i>
            </button>
          </div>
          <div class="form-text">Minimum 8 caractères</div>
        </div>
        <div class="form-group">
          <label>Confirmer le mot de passe <span class="required">*</span></label>
          <div style="position:relative">
            <input type="password" id="password2" class="form-control" placeholder="Répétez le mot de passe" required>
            <button type="button" onclick="togglePwd('password2','eye2')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--gray-400)">
              <i class="fas fa-eye" id="eye2"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Wilaya</label>
        <select id="wilaya_id" data-cselect-icon="fas fa-map-marker-alt" class="form-control">
          <option value="">Sélectionnez votre wilaya</option>
        </select>
      </div>

      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal">
          <input type="checkbox" id="agree" required>
          J'accepte les <a href="#" style="margin-left:4px">conditions d'utilisation</a>
        </label>
      </div>

      <div id="form-error" class="error-msg" style="margin-bottom:12px;font-size:14px"></div>

      <button type="submit" class="btn btn-orange btn-block btn-lg" id="submit-btn">
        <span id="btn-text"><i class="fas fa-user-plus"></i> Créer mon compte</span>
        <div class="spinner" id="btn-spinner" style="display:none"></div>
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:14px">
      Déjà inscrit ? <a href="login.html" style="color:var(--orange);font-weight:700">Se connecter</a>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<style>
.account-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 480px) { .account-type-grid { grid-template-columns: 1fr; } }
.account-type-btn {
  border: 2px solid var(--gray-200); border-radius: var(--r-lg);
  padding: 16px; text-align: center; cursor: pointer; transition: var(--transition);
  background: #fff;
}
.account-type-btn.active { border-color: var(--orange); background: rgba(242,101,34,.05); }
.account-type-btn:hover  { border-color: var(--orange); }
</style>

</div>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // Inscription désactivée — redirection vers accueil (décommentez la ligne ci-dessous pour bloquer l'inscription)
    // window.location.href = '../index.html';

  // Load wilayas
  CategoriesAPI.wilayas().then(w => {
    const sel = document.getElementById('wilaya_id');
    w.forEach(wl => sel.insertAdjacentHTML('beforeend', `<option value="${wl.id}">${wl.id} - ${wl.name_fr}</option>`));
  });

  function setAccountType(type) {
    document.getElementById('account_type').value = type;
    document.getElementById('btn-individual').classList.toggle('active', type === 'individual');
    document.getElementById('btn-professional').classList.toggle('active', type === 'professional');
    document.getElementById('company-group').style.display = type === 'professional' ? '' : 'none';
  }

  function togglePwd(inputId, eyeId) {
    const inp = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    eye.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
  }

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('form-error');
    errEl.classList.remove('show');

    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    if (password !== password2) {
      errEl.textContent = 'Les mots de passe ne correspondent pas.';
      errEl.classList.add('show');
      return;
    }

    const btn     = document.getElementById('submit-btn');
    const spinner = document.getElementById('btn-spinner');
    const btnText = document.getElementById('btn-text');
    btn.disabled  = true;
    spinner.style.display = 'inline-block';
    btnText.style.display = 'none';

    const body = {
      full_name:    document.getElementById('full_name').value.trim(),
      email:        document.getElementById('email').value.trim(),
      password,
      phone:        document.getElementById('phone').value.trim() || undefined,
      account_type: document.getElementById('account_type').value,
      company_name: document.getElementById('company_name').value.trim() || undefined,
      wilaya_id:    parseInt(document.getElementById('wilaya_id').value) || undefined,
    };

    try {
      const data = await AuthAPI.register(body);
      Auth.setToken(data.token);
      Auth.setUser(data.user);
      showToast('Compte créé avec succès !', 'success');
      setTimeout(() => {
        window.location.href = data.user?.role === 'admin' ? 'dashboard.html' : '../index.html';
      }, 900);
    } catch (err) {
      const msg = err.errors ? err.errors.map(e => e.msg).join(', ') : (err.error || 'Erreur lors de l\'inscription.');
      errEl.textContent = msg;
      errEl.classList.add('show');
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.style.display = 'inline-flex';
    }
  });
</script>
</body>
</html>
