<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- PWA / installable mobile -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#f26522">
  <link rel="icon" href="/assets/icons/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/assets/icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pro Market">
  <title>Mot de passe oublié — Pro Market Algérie</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" crossorigin="anonymous">
  <style>
    /* Verrouille la taille du bouton de soumission. animations.css enrichit .btn
       d'un halo ::before qui gonfle à 300 % au survol, d'un scale(0.96) au clic
       et d'une transition « all » à easing overshoot : combinés au spinner
       injecté, ils faisaient « grandir » le bouton verticalement pendant la
       requête. Taille FIXE, non négociable. */
    #submit-btn {
      height: 48px !important;
      min-height: 48px !important;
      max-height: 48px !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      overflow: hidden;
      transition-property: background-color, background-position, box-shadow, opacity, color, border-color;
      transition-duration: var(--t-base);
      transition-timing-function: ease;
    }
    #submit-btn:hover,
    #submit-btn:active { transform: none !important; }
    #submit-btn::before { display: none !important; }
    /* Spinner toujours hors flux et de taille fixe : ne peut jamais agrandir le bouton */
    #submit-btn #btn-spinner {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 22px !important;
      height: 22px !important;
    }
  </style>
</head>
<body>
<div id="site-header"></div>

<div class="page-wrapper">
<div style="min-height:calc(100vh - 200px);display:flex;align-items:center;padding:40px 16px">
  <div class="form-card" style="max-width:440px;width:100%">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:2.5rem;color:var(--orange);margin-bottom:8px"><i class="fas fa-key"></i></div>
      <h2 style="color:var(--dark)">Mot de passe oublié</h2>
      <p style="color:var(--gray-600);font-size:14px">Entrez votre email pour recevoir un lien de réinitialisation.</p>
    </div>

    <form id="forgot-form">
      <div class="form-group">
        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="votre@email.com" required autocomplete="email" inputmode="email">
        <div class="error-msg" id="email-error"></div>
      </div>

      <div id="form-error" class="error-msg" style="margin-bottom:12px;font-size:14px"></div>

      <button type="submit" class="btn btn-orange btn-block btn-lg" id="submit-btn" style="position:relative">
        <span id="btn-text"><i class="fas fa-paper-plane"></i> Envoyer le lien</span>
        <div class="spinner" id="btn-spinner" style="display:none;position:absolute;inset:0;margin:auto"></div>
      </button>
    </form>

    <!-- Message de confirmation (affiché après envoi) -->
    <div id="success-box" style="display:none;text-align:center;padding:8px 0">
      <div style="font-size:2.5rem;color:var(--green,#16a34a);margin-bottom:12px"><i class="fas fa-check-circle"></i></div>
      <p id="success-msg" style="color:var(--gray-700);font-size:14px;margin-bottom:16px"></p>
      <div id="dev-link-box" style="display:none;background:var(--gray-100);border-radius:var(--r-md);padding:12px;margin-bottom:16px;font-size:13px;word-break:break-all">
        <strong>Mode dev (SMTP non configuré) :</strong><br>
        <a id="dev-link" href="#" style="color:var(--orange)">Ouvrir le lien de réinitialisation</a>
      </div>
    </div>

    <div style="text-align:center;margin-top:24px;padding-top:20px;border-top:2px solid var(--gray-200)">
      <a href="login.html" style="font-size:13px"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
    </div>
  </div>
</div>

<div id="site-footer"></div>
</div>

<script src="../js/api.js"></script>
<script src="../js/main.js"></script>
<script>
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email   = document.getElementById('email').value.trim();
    const errEl   = document.getElementById('form-error');
    const btn     = document.getElementById('submit-btn');
    const spinner = document.getElementById('btn-spinner');
    const btnText = document.getElementById('btn-text');

    errEl.classList.remove('show');
    btn.disabled = true;
    spinner.style.display = 'inline-block';
    btnText.style.visibility = 'hidden';

    try {
      const data = await AuthAPI.forgotPassword(email);
      // Réponse volontairement générique côté serveur (anti-énumération).
      document.getElementById('forgot-form').style.display = 'none';
      document.getElementById('success-msg').textContent = data.message ||
        'Si un compte existe pour cet email, un lien de réinitialisation vient d\'être envoyé.';
      // En dev, le backend renvoie le lien directement si le SMTP n'est pas configuré.
      if (data.devResetUrl) {
        const box = document.getElementById('dev-link-box');
        const link = document.getElementById('dev-link');
        link.href = data.devResetUrl;
        box.style.display = 'block';
      }
      document.getElementById('success-box').style.display = 'block';
    } catch (err) {
      console.error('Forgot password error:', err);
      let msg = 'Une erreur est survenue. Réessayez plus tard.';
      if (err.status === 0 || err.message?.includes('fetch')) {
        msg = 'Impossible de contacter le serveur. Vérifiez que le backend tourne sur le port 3001.';
      } else if (err.error) {
        msg = err.error;
      }
      errEl.textContent = msg;
      errEl.classList.add('show');
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.style.visibility = 'visible';
    }
  });
</script>
</body>
</html>
