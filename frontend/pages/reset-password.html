<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- PWA / installable mobile -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#f26522">
  <link rel="icon" href="/assets/icons/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/assets/icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pro Market">
  <title>Réinitialiser le mot de passe — Pro Market Algérie</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" crossorigin="anonymous">
  <style>
    /* Verrouille la taille du bouton de soumission. animations.css enrichit .btn
       d'un halo ::before qui gonfle à 300 % au survol, d'un scale(0.96) au clic
       et d'une transition « all » à easing overshoot : combinés au spinner
       injecté, ils faisaient « grandir » le bouton verticalement pendant la
       requête. Taille FIXE, non négociable. */
    #submit-btn {
      height: 48px !important;
      min-height: 48px !important;
      max-height: 48px !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      overflow: hidden;
      transition-property: background-color, background-position, box-shadow, opacity, color, border-color;
      transition-duration: var(--t-base);
      transition-timing-function: ease;
    }
    #submit-btn:hover,
    #submit-btn:active { transform: none !important; }
    #submit-btn::before { display: none !important; }
    /* Spinner toujours hors flux et de taille fixe : ne peut jamais agrandir le bouton */
    #submit-btn #btn-spinner {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 22px !important;
      height: 22px !important;
    }
  </style>
</head>
<body>
<div id="site-header"></div>

<div class="page-wrapper">
<div style="min-height:calc(100vh - 200px);display:flex;align-items:center;padding:40px 16px">
  <div class="form-card" style="max-width:440px;width:100%">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:2.5rem;color:var(--orange);margin-bottom:8px"><i class="fas fa-lock"></i></div>
      <h2 style="color:var(--dark)">Nouveau mot de passe</h2>
      <p style="color:var(--gray-600);font-size:14px">Choisissez un nouveau mot de passe pour votre compte.</p>
    </div>

    <!-- Affiché si le token est absent ou invalide -->
    <div id="invalid-box" style="display:none;text-align:center;padding:8px 0">
      <div style="font-size:2.5rem;color:var(--red,#dc2626);margin-bottom:12px"><i class="fas fa-times-circle"></i></div>
      <p style="color:var(--gray-700);font-size:14px;margin-bottom:16px">
        Ce lien de réinitialisation est invalide ou a expiré.
      </p>
      <a href="forgot-password.html" class="btn btn-orange">Refaire une demande</a>
    </div>

    <form id="reset-form">
      <div class="form-group">
        <label for="password">Nouveau mot de passe <span class="required">*</span></label>
        <div style="position:relative">
          <input type="password" id="password" class="form-control" placeholder="8 caractères minimum" required minlength="8" autocomplete="new-password">
          <button type="button" onclick="togglePwd('password','eye1')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--gray-400)">
            <i class="fas fa-eye" id="eye1"></i>
          </button>
        </div>
        <div class="error-msg" id="pwd-error"></div>
      </div>

      <div class="form-group">
        <label for="password2">Confirmer le mot de passe <span class="required">*</span></label>
        <div style="position:relative">
          <input type="password" id="password2" class="form-control" placeholder="Répétez le mot de passe" required minlength="8" autocomplete="new-password">
          <button type="button" onclick="togglePwd('password2','eye2')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--gray-400)">
            <i class="fas fa-eye" id="eye2"></i>
          </button>
        </div>
        <div class="error-msg" id="pwd2-error"></div>
      </div>

      <div id="form-error" class="error-msg" style="margin-bottom:12px;font-size:14px"></div>

      <button type="submit" class="btn btn-orange btn-block btn-lg" id="submit-btn" style="position:relative">
        <span id="btn-text"><i class="fas fa-check"></i> Réinitialiser</span>
        <div class="spinner" id="btn-spinner" style="display:none;position:absolute;inset:0;margin:auto"></div>
      </button>
    </form>

    <div style="text-align:center;margin-top:24px;padding-top:20px;border-top:2px solid var(--gray-200)">
      <a href="login.html" style="font-size:13px"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
    </div>
  </div>
</div>

<div id="site-footer"></div>
</div>

<script src="../js/api.js"></script>
<script src="../js/main.js"></script>
<script>
  const token = new URLSearchParams(location.search).get('token');

  // Pas de token => on masque le formulaire et on affiche le message d'erreur.
  if (!token) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('invalid-box').style.display = 'block';
  }

  function togglePwd(inputId, eyeId) {
    const inp = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    if (inp.type === 'password') { inp.type = 'text'; eye.className = 'fas fa-eye-slash'; }
    else { inp.type = 'password'; eye.className = 'fas fa-eye'; }
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pwd     = document.getElementById('password').value;
    const pwd2    = document.getElementById('password2').value;
    const errEl   = document.getElementById('form-error');
    const btn     = document.getElementById('submit-btn');
    const spinner = document.getElementById('btn-spinner');
    const btnText = document.getElementById('btn-text');

    errEl.classList.remove('show');

    if (pwd.length < 8) {
      errEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
      errEl.classList.add('show');
      return;
    }
    if (pwd !== pwd2) {
      errEl.textContent = 'Les deux mots de passe ne correspondent pas.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    spinner.style.display = 'inline-block';
    btnText.style.visibility = 'hidden';

    try {
      const data = await AuthAPI.resetPassword(token, pwd);
      showToast(data.message || 'Mot de passe réinitialisé avec succès !', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } catch (err) {
      console.error('Reset password error:', err);
      let msg = 'Une erreur est survenue. Réessayez.';
      if (err.status === 0 || err.message?.includes('fetch')) {
        msg = 'Impossible de contacter le serveur. Vérifiez que le backend tourne sur le port 3001.';
      } else if (err.errors && err.errors.length) {
        msg = err.errors[0].msg;
      } else if (err.error) {
        msg = err.error;
      }
      errEl.textContent = msg;
      errEl.classList.add('show');
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.style.visibility = 'visible';
    }
  });
</script>
</body>
</html>
