<script src="../js/api.js"></script>
<script src="../js/main.js"></script>
<script>
  const urlParams   = new URLSearchParams(location.search);
  let currentPage   = 1;
  let currentCat    = null;
  let debounceTimer = null;
  let isLoading     = false;

  // ── URL State Synchronization ─────────────────────────────
  function syncFiltersToURL(filters) {
    const params = new URLSearchParams(location.search);
    const keys = ['q','wilaya','max_price','condition','sort','slug','category'];

    // Clear existing filter params
    keys.forEach(k => params.delete(k));
    params.delete('page');

    // Set new values (skip empty)
    Object.entries(filters).forEach(([key, val]) => {
      if (val !== '' && val != null && val !== false && key !== 'limit' && key !== 'page') {
        if (key.startsWith('attr_')) {
          params.set(key, val);
        } else if (keys.includes(key) || key === 'slug' || key === 'category') {
          params.set(key, val);
        }
      }
    });

    if (filters.page > 1) params.set('page', filters.page);

    const newUrl = `${location.pathname}?${params.toString()}`;
    window.history.replaceState({ filters }, '', newUrl);
  }

  function readFiltersFromURL() {
    const p = new URLSearchParams(location.search);
    return {
      q:         p.get('q') || '',
      wilaya:    p.get('wilaya') || '',
      max_price: p.get('max_price') || '',
      condition: p.get('condition') || '',
      sort:      p.get('sort') || 'recent',
      page:      parseInt(p.get('page')) || 1,
    };
  }

  function applyURLFiltersToInputs() {
    const f = readFiltersFromURL();
    if (f.q)         document.getElementById('f-q').value         = f.q;
    if (f.wilaya)    document.getElementById('f-wilaya').value    = f.wilaya;
    if (f.max_price) document.getElementById('f-max-price').value = f.max_price;
    if (f.condition) document.getElementById('f-condition').value = f.condition;
    if (f.sort)      document.getElementById('sort-select').value = f.sort;
    currentPage = f.page;
    updateClearButtons();
  }

  // ── Debounce ──────────────────────────────────────────────
  function debounceFilter() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => applyFilters(true), 400);
  }

  // ── Build Filters ─────────────────────────────────────────
  function buildFilters() {
    const filters = {
      q:          document.getElementById('f-q')?.value.trim() || '',
      wilaya:     document.getElementById('f-wilaya')?.value || '',
      max_price:  document.getElementById('f-max-price')?.value || '',
      condition:  document.getElementById('f-condition')?.value || '',
      sort:       document.getElementById('sort-select')?.value || 'recent',
      page:       currentPage,
      limit:      24,
    };
    if (currentCat) filters.category = currentCat.slug;

    document.querySelectorAll('[data-attr-key]').forEach(el => {
      const val = el.type === 'checkbox' ? el.checked : el.value;
      if (val) filters[`attr_${el.dataset.attrKey}`] = val;
    });

    return filters;
  }

  // ── Apply / Reset ─────────────────────────────────────────
  function applyFilters(resetPage = true) {
    if (resetPage) currentPage = 1;
    const filters = buildFilters();
    syncFiltersToURL(filters);
    renderActiveChips(filters);
    loadListings();
  }

  function resetFilters() {
    document.getElementById('f-q').value = '';
    document.getElementById('f-wilaya').value = '';
    document.getElementById('f-max-price').value = '';
    document.getElementById('f-condition').value = '';
    document.getElementById('sort-select').value = 'recent';
    document.querySelectorAll('[data-attr-key]').forEach(el => {
      if (el.type === 'checkbox') el.checked = false; else el.value = '';
    });
    applyFilters(true);
  }

  function clearFilter(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = '';
    applyFilters(true);
  }

  function updateClearButtons() {
    const qVal = document.getElementById('f-q')?.value;
    const pVal = document.getElementById('f-max-price')?.value;
    document.getElementById('clear-q').style.display = qVal ? 'flex' : 'none';
    const clearP = document.getElementById('clear-price');
    if (clearP) clearP.style.display = pVal ? 'flex' : 'none';
  }

  // ── Active Filter Chips ───────────────────────────────────
  const FILTER_LABELS = {
    q: 'Recherche', wilaya: 'Wilaya', max_price: 'Prix max',
    condition: 'État', sort: 'Tri',
    new: 'Neuf', excellent: 'Très bon état', good: 'Bon état', fair: 'Correct', for_parts: 'Pour pièces',
    recent: 'Récentes', price_asc: 'Prix ↑', price_desc: 'Prix ↓', views: 'Plus vues'
  };

  function renderActiveChips(filters) {
    const container = document.getElementById('active-filters-chips');
    const bar = document.getElementById('active-filters-bar');
    const chips = [];

    const addChip = (key, label, value, onRemove) => {
      chips.push(`<span class="filter-chip">${escapeHtml(label)}: <strong>${escapeHtml(value)}</strong><button onclick="${onRemove}" aria-label="Retirer le filtre"><i class="fas fa-times"></i></button></span>`);
    };

    if (filters.q) addChip('q', 'Recherche', filters.q, `clearFilter('f-q')`);
    if (filters.wilaya) {
      const sel = document.getElementById('f-wilaya');
      const text = sel?.options[sel.selectedIndex]?.text || filters.wilaya;
      addChip('wilaya', 'Wilaya', text, `clearFilter('f-wilaya')`);
    }
    if (filters.max_price) addChip('max_price', 'Prix max', Number(filters.max_price).toLocaleString('fr-DZ') + ' DZD', `clearFilter('f-max-price')`);
    if (filters.condition) addChip('condition', 'État', FILTER_LABELS[filters.condition] || filters.condition, `clearFilter('f-condition')`);

    // Dynamic attr chips
    document.querySelectorAll('[data-attr-key]').forEach(el => {
      const val = el.type === 'checkbox' ? el.checked : el.value;
      if (!val) return;
      const label = el.closest('.filter-group')?.querySelector('label')?.textContent?.trim() || el.dataset.attrKey;
      const displayVal = el.type === 'checkbox' ? 'Oui' : val;
      chips.push(`<span class="filter-chip">${escapeHtml(label)}: <strong>${escapeHtml(displayVal)}</strong><button onclick="clearDynamicFilter('${el.dataset.attrKey}')" aria-label="Retirer le filtre"><i class="fas fa-times"></i></button></span>`);
    });

    if (chips.length) {
      container.innerHTML = chips.join('');
      bar.style.display = 'flex';
    } else {
      bar.style.display = 'none';
      container.innerHTML = '';
    }
  }

  window.clearDynamicFilter = function(key) {
    const el = document.querySelector(`[data-attr-key="${key}"]`);
    if (el) { if (el.type === 'checkbox') el.checked = false; else el.value = ''; }
    applyFilters(true);
  };

  // ── Skeleton Loading ──────────────────────────────────────
  function renderSkeletonGrid(count = 8) {
    return `
      <div class="listings-skeleton-grid" style="grid-column:1/-1">
        ${Array(count).fill(0).map(() => `
          <div class="skeleton-card-v2">
            <div class="skeleton-img-v2"></div>
            <div class="skeleton-body-v2">
              <div class="skeleton-line title"></div>
              <div class="skeleton-line price"></div>
              <div class="skeleton-line meta"></div>
            </div>
          </div>
        `).join('')}
      </div>`;
  }

  // ── Load Listings ─────────────────────────────────────────
  async function loadListings() {
    if (isLoading) return;
    isLoading = true;

    const grid = document.getElementById('listings-grid');
    const pag = document.getElementById('pagination');

    // Show skeleton on first load, fade on subsequent
    if (!grid.innerHTML.includes('listing-card')) {
      grid.innerHTML = renderSkeletonGrid(8);
    } else {
      grid.classList.add('is-loading');
    }

    try {
      const params = buildFilters();
      const res = await ListingsAPI.search(params);
      document.getElementById('result-count').textContent = `${res.pagination.total.toLocaleString('fr-DZ')} annonce${res.pagination.total > 1 ? 's' : ''} trouvée${res.pagination.total > 1 ? 's' : ''}`;

      grid.classList.remove('is-loading');

      if (!res.data.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <i class="fas fa-search" style="font-size:3rem;color:var(--gray-300)"></i>
            <p style="font-size:1.1rem;font-weight:600;margin-top:12px">Aucune annonce trouvée</p>
            <p style="font-size:13px;color:var(--gray-500);margin-top:4px">Essayez d'élargir vos critères de recherche.</p>
            <button class="btn btn-outline-orange mt-3" onclick="resetFilters()">
              <i class="fas fa-undo"></i> Réinitialiser les filtres
            </button>
          </div>`;
        pag.innerHTML = '';
        isLoading = false;
        return;
      }

      grid.innerHTML = res.data.map((l, i) => renderListingCard(l)).join('');
      renderPagination(res.pagination);

      // Re-init card animations
      setTimeout(() => { if (window.initListingCards) window.initListingCards(); }, 50);

    } catch (err) {
      grid.classList.remove('is-loading');
      console.error('Erreur chargement annonces:', err);
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <i class="fas fa-exclamation-circle" style="font-size:3rem;color:var(--red)"></i>
          <p style="font-size:1.1rem;font-weight:600;margin-top:12px">Erreur de chargement</p>
          <p style="font-size:13px;color:var(--gray-500);margin-top:4px">Impossible de récupérer les annonces. Vérifiez votre connexion.</p>
          <button class="btn btn-orange mt-3" onclick="loadListings()">
            <i class="fas fa-redo"></i> Réessayer
          </button>
        </div>`;
      pag.innerHTML = '';
    }

    isLoading = false;
  }

  // ── Pagination ────────────────────────────────────────────
  function renderPagination({ page, pages, total }) {
    const pag = document.getElementById('pagination');
    if (pages <= 1) { pag.innerHTML = ''; return; }

    let html = '';
    // Prev
    if (page > 1) {
      html += `<a href="#" onclick="goPage(${page-1});return false" aria-label="Page précédente"><i class="fas fa-chevron-left"></i></a>`;
    } else {
      html += `<span class="disabled" aria-disabled="true"><i class="fas fa-chevron-left"></i></span>`;
    }

    // First page + ellipsis
    if (page > 3) {
      html += `<a href="#" onclick="goPage(1);return false">1</a>`;
      if (page > 4) html += `<span class="dots">…</span>`;
    }

    // Window around current
    for (let p = Math.max(1, page-2); p <= Math.min(pages, page+2); p++) {
      if (p === page) {
        html += `<span class="active" aria-current="page">${p}</span>`;
      } else {
        html += `<a href="#" onclick="goPage(${p});return false">${p}</a>`;
      }
    }

    // Last page + ellipsis
    if (page < pages - 2) {
      if (page < pages - 3) html += `<span class="dots">…</span>`;
      html += `<a href="#" onclick="goPage(${pages});return false">${pages}</a>`;
    }

    // Next
    if (page < pages) {
      html += `<a href="#" onclick="goPage(${page+1});return false" aria-label="Page suivante"><i class="fas fa-chevron-right"></i></a>`;
    } else {
      html += `<span class="disabled" aria-disabled="true"><i class="fas fa-chevron-right"></i></span>`;
    }

    pag.innerHTML = html;
  }

  function goPage(p) {
    currentPage = p;
    const filters = buildFilters();
    syncFiltersToURL(filters);
    loadListings();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Mobile Filters ────────────────────────────────────────
  function toggleMobileFilters() {
    const sidebar = document.getElementById('filter-sidebar');
    const overlay = document.getElementById('filter-overlay');
    const isOpen = sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('active', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  }

  // ── Alert ─────────────────────────────────────────────────
  function saveSearchAlert() {
    if (!Auth.isLoggedIn()) { window.location.href = 'login.html?redirect=' + encodeURIComponent(location.href); return; }
    const label = currentCat ? currentCat.name_fr : 'Recherche';
    document.getElementById('alert-label').value = label;
    openModal('alert-modal');
  }

  async function confirmSaveAlert() {
    const label       = document.getElementById('alert-label').value.trim();
    const notifyEmail = document.getElementById('alert-email').checked;
    const filters = buildFilters();
    delete filters.page; delete filters.limit; delete filters.sort;
    try {
      await AlertsAPI.create({ label: label || 'Mon alerte', filters, notify_email: notifyEmail });
      closeModal('alert-modal');
      showToast('Alerte créée ! Vous serez notifié par email.', 'success');
    } catch {
      showToast('Erreur lors de la création de l\'alerte.', 'error');
    }
  }

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    // Category from URL
    const slug = urlParams.get('slug') || urlParams.get('category');
    if (slug) {
      try {
        currentCat = await CategoriesAPI.get(slug);
        document.getElementById('page-title').textContent = currentCat.name_fr;
        document.getElementById('page-title-bc').textContent = currentCat.name_fr;
        document.title = `${currentCat.name_fr} — Pro Market Algérie`;

        if (currentCat.filters?.length) {
          const dynEl = document.getElementById('dynamic-filters');
          dynEl.innerHTML = currentCat.filters.map(f => {
            if (f.type === 'select') {
              return `<div class="filter-group">
                <label>${escapeHtml(f.label_fr)}</label>
                <select class="form-control" data-attr-key="${f.key}" onchange="applyFilters()">
                  <option value="">Tous</option>
                  ${f.options.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('')}
                </select></div>`;
            } else if (f.type === 'number') {
              return `<div class="filter-group">
                <label>${escapeHtml(f.label_fr)}</label>
                <input type="number" class="form-control" data-attr-key="${f.key}" placeholder="${escapeHtml(f.label_fr)}" oninput="debounceFilter()">
              </div>`;
            } else if (f.type === 'boolean') {
              return `<div class="filter-group">
                <label style="display:flex;align-items:center;gap:6px;font-weight:normal;cursor:pointer">
                  <input type="checkbox" data-attr-key="${f.key}" onchange="applyFilters()">
                  ${escapeHtml(f.label_fr)}
                </label></div>`;
            }
            return `<div class="filter-group">
              <label>${escapeHtml(f.label_fr)}</label>
              <input type="text" class="form-control" data-attr-key="${f.key}" placeholder="${escapeHtml(f.label_fr)}" oninput="debounceFilter()">
            </div>`;
          }).join('');
        }
      } catch {}
    }

    // Apply URL filters to inputs
    applyURLFiltersToInputs();

    // Update chips
    renderActiveChips(buildFilters());

    // Load listings
    loadListings();

    // Watch search input for clear button
    document.getElementById('f-q')?.addEventListener('input', updateClearButtons);
  }

  init();
</script>
</body>
</html>
