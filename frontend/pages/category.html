<script>
  const urlParams   = new URLSearchParams(location.search);
  let currentPage   = 1;
  let currentCat    = null;
  let debounceTimer = null;
  let isLoading     = false;

  // ── URL State Synchronization ─────────────────────────────
  function syncFiltersToURL(filters) {
    const params = new URLSearchParams(location.search);
    const keys = ['q','wilaya','min_price','max_price','condition','sort','slug','category'];
    keys.forEach(k => params.delete(k));
    params.delete('page');
    Object.entries(filters).forEach(([key, val]) => {
      if (val !== '' && val != null && val !== false && key !== 'limit' && key !== 'page') {
        if (key.startsWith('attr_')) params.set(key, val);
        else if (keys.includes(key) || key === 'slug' || key === 'category') params.set(key, val);
      }
    });
    if (filters.page > 1) params.set('page', filters.page);
    const newUrl = `${location.pathname}?${params.toString()}`;
    // Évite l'erreur de sécurité en local (file://)
    if (location.protocol !== 'file:') {
      window.history.replaceState({ filters }, '', newUrl);
    }
  }

  function readFiltersFromURL() {
    const p = new URLSearchParams(location.search);
    return {
      q:         p.get('q') || '',
      wilaya:    p.get('wilaya') || '',
      min_price: p.get('min_price') || '',
      max_price: p.get('max_price') || '',
      condition: p.get('condition') || '',
      sort:      p.get('sort') || 'recent',
      page:      parseInt(p.get('page')) || 1,
    };
  }

  function applyURLFiltersToInputs() {
    const f = readFiltersFromURL();
    ['q','wilaya','min_price','max_price'].forEach(id => {
      const el = document.getElementById('f-' + id);
      const drawerEl = document.getElementById('f-' + id + '-drawer');
      if (f[id] && el) el.value = f[id];
      if (f[id] && drawerEl) drawerEl.value = f[id];
    });
    if (f.condition) {
      document.getElementById('f-condition').value = f.condition;
      const drawerCond = document.getElementById('f-condition-drawer');
      if (drawerCond) drawerCond.value = f.condition;
    }
    if (f.sort) document.getElementById('sort-select').value = f.sort;
    currentPage = f.page;
    updateClearButtons();
  }

  // ── Debounce ──────────────────────────────────────────────
  function debounceFilter() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => applyFilters(true), 400);
  }

  // ── Sync drawer <-> main bar ──────────────────────────────
  function syncFilterFromDrawer(id) {
    const drawerEl = document.getElementById(id + '-drawer');
    const mainEl = document.getElementById(id);
    if (drawerEl && mainEl) mainEl.value = drawerEl.value;
    applyFilters(true);
  }
  function syncFilterToDrawer(id) {
    const drawerEl = document.getElementById(id + '-drawer');
    const mainEl = document.getElementById(id);
    if (drawerEl && mainEl) drawerEl.value = mainEl.value;
  }

  // ── Build Filters ─────────────────────────────────────────
  function buildFilters() {
    const filters = {
      q:         document.getElementById('f-q')?.value.trim() || '',
      wilaya:    document.getElementById('f-wilaya')?.value || '',
      min_price: document.getElementById('f-min-price')?.value || '',
      max_price: document.getElementById('f-max-price')?.value || '',
      condition: document.getElementById('f-condition')?.value || '',
      sort:      document.getElementById('sort-select')?.value || 'recent',
      page:      currentPage,
      limit:     24,
    };
    if (currentCat) filters.category = currentCat.slug;
    document.querySelectorAll('[data-attr-key]').forEach(el => {
      const val = el.type === 'checkbox' ? el.checked : el.value;
      if (val) filters[`attr_${el.dataset.attrKey}`] = val;
    });
    return filters;
  }

  // ── Apply / Reset ─────────────────────────────────────────
  function applyFilters(resetPage = true) {
    if (resetPage) currentPage = 1;
    const filters = buildFilters();
    syncFiltersToURL(filters);
    renderActiveChips(filters);
    loadListings();
  }

  function resetFilters() {
    ['f-q','f-wilaya','f-min-price','f-max-price'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
      const drawerEl = document.getElementById(id + '-drawer');
      if (drawerEl) drawerEl.value = '';
    });
    document.getElementById('f-condition').value = '';
    const drawerCond = document.getElementById('f-condition-drawer');
    if (drawerCond) drawerCond.value = '';
    document.getElementById('sort-select').value = 'recent';
    document.querySelectorAll('[data-attr-key]').forEach(el => {
      if (el.type === 'checkbox') el.checked = false; else el.value = '';
    });
    applyFilters(true);
  }

  function clearFilter(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = '';
    syncFilterToDrawer(id);
    applyFilters(true);
  }

  function updateClearButtons() {
    const qVal = document.getElementById('f-q')?.value;
    const clearBtn = document.getElementById('clear-q');
    if (clearBtn) clearBtn.style.display = qVal ? 'flex' : 'none';
  }

  // ── Active Filter Chips ───────────────────────────────────
  const FILTER_LABELS = {
    q: 'Recherche', wilaya: 'Wilaya', min_price: 'Prix min', max_price: 'Prix max',
    condition: 'État', sort: 'Tri',
    new: 'Neuf', excellent: 'Très bon état', good: 'Bon état', fair: 'Correct', for_parts: 'Pour pièces',
    recent: 'Récentes', price_asc: 'Prix ↑', price_desc: 'Prix ↓', views: 'Plus vues'
  };

  function renderActiveChips(filters) {
    const container = document.getElementById('active-filters-chips');
    const bar = document.getElementById('active-filters-bar');
    const chips = [];
    const addChip = (key, label, value, onRemove) => {
      chips.push(`<span class="filter-chip">${escapeHtml(label)}: <strong>${escapeHtml(value)}</strong><button onclick="${onRemove}" aria-label="Retirer"><i class="fas fa-times"></i></button></span>`);
    };
    if (filters.q) addChip('q', 'Recherche', filters.q, `clearFilter('f-q')`);
    if (filters.wilaya) {
      const sel = document.getElementById('f-wilaya');
      const text = sel?.options[sel.selectedIndex]?.text?.split('—')[1]?.trim() || filters.wilaya;
      addChip('wilaya', 'Wilaya', text, `clearFilter('f-wilaya')`);
    }
    if (filters.min_price) addChip('min_price', 'Min', Number(filters.min_price).toLocaleString('fr-DZ') + ' DZD', `clearFilter('f-min-price')`);
    if (filters.max_price) addChip('max_price', 'Max', Number(filters.max_price).toLocaleString('fr-DZ') + ' DZD', `clearFilter('f-max-price')`);
    if (filters.condition) addChip('condition', 'État', FILTER_LABELS[filters.condition] || filters.condition, `clearFilter('f-condition')`);
    document.querySelectorAll('[data-attr-key]').forEach(el => {
      const val = el.type === 'checkbox' ? el.checked : el.value;
      if (!val) return;
      const label = el.closest('.filter-group')?.querySelector('label')?.textContent?.trim() || el.dataset.attrKey;
      const displayVal = el.type === 'checkbox' ? 'Oui' : val;
      chips.push(`<span class="filter-chip">${escapeHtml(label)}: <strong>${escapeHtml(displayVal)}</strong><button onclick="clearDynamicFilter('${el.dataset.attrKey}')" aria-label="Retirer"><i class="fas fa-times"></i></button></span>`);
    });
    if (chips.length) {
      container.innerHTML = chips.join('');
      bar.style.display = 'flex';
    } else {
      bar.style.display = 'none';
      container.innerHTML = '';
    }
  }

  window.clearDynamicFilter = function(key) {
    const el = document.querySelector(`[data-attr-key="${key}"]`);
    if (el) { if (el.type === 'checkbox') el.checked = false; else el.value = ''; }
    applyFilters(true);
  };

  // ── Mobile Filters Drawer ─────────────────────────────────
  function toggleMobileFilters() {
    const drawer = document.getElementById('filter-drawer');
    const overlay = document.getElementById('filter-overlay');
    const isOpen = drawer.classList.toggle('open');
    overlay.classList.toggle('active', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  }

  // ── Skeleton Loading ──────────────────────────────────────
  function renderSkeletonGrid(count = 8) {
    return `
      <div class="listings-skeleton-grid" style="grid-column:1/-1">
        ${Array(count).fill(0).map(() => `
          <div class="skeleton-card-v2">
            <div class="skeleton-img-v2"></div>
            <div class="skeleton-body-v2">
              <div class="skeleton-line title"></div>
              <div class="skeleton-line price"></div>
              <div class="skeleton-line meta"></div>
            </div>
          </div>
        `).join('')}
      </div>`;
  }

  // ── Load Listings ─────────────────────────────────────────
  async function loadListings() {
    if (isLoading) return;
    isLoading = true;
    const grid = document.getElementById('listings-grid');
    const pag = document.getElementById('pagination');
    if (!grid.innerHTML.includes('listing-card')) {
      grid.innerHTML = renderSkeletonGrid(8);
    } else {
      grid.classList.add('is-loading');
    }
    try {
      const params = buildFilters();
      const res = await ListingsAPI.search(params);
      document.getElementById('result-count').textContent = `${res.pagination.total.toLocaleString('fr-DZ')} annonce${res.pagination.total > 1 ? 's' : ''} trouvée${res.pagination.total > 1 ? 's' : ''}`;
      grid.classList.remove('is-loading');
      if (!res.data.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <i class="fas fa-search" style="font-size:3rem;color:var(--gray-300)"></i>
            <p style="font-size:1.1rem;font-weight:600;margin-top:12px">Aucune annonce trouvée</p>
            <p style="font-size:13px;color:var(--gray-500);margin-top:4px">Essayez d'élargir vos critères de recherche.</p>
            <button class="btn btn-outline-orange mt-3" onclick="resetFilters()"><i class="fas fa-undo"></i> Réinitialiser</button>
          </div>`;
        pag.innerHTML = '';
        isLoading = false;
        return;
      }
      grid.innerHTML = res.data.map(l => renderListingCard(l)).join('');
      renderPagination(res.pagination);
      setTimeout(() => { if (window.initListingCards) window.initListingCards(); }, 50);
    } catch (err) {
      grid.classList.remove('is-loading');
      console.error('Erreur:', err);
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <i class="fas fa-exclamation-circle" style="font-size:3rem;color:var(--red)"></i>
          <p style="font-size:1.1rem;font-weight:600;margin-top:12px">Erreur de chargement</p>
          <button class="btn btn-orange mt-3" onclick="loadListings()"><i class="fas fa-redo"></i> Réessayer</button>
        </div>`;
      pag.innerHTML = '';
    }
    isLoading = false;
  }

  // ── Pagination ────────────────────────────────────────────
  function renderPagination({ page, pages }) {
    const pag = document.getElementById('pagination');
    if (pages <= 1) { pag.innerHTML = ''; return; }
    let html = '';
    if (page > 1) html += `<a href="#" onclick="goPage(${page-1});return false"><i class="fas fa-chevron-left"></i></a>`;
    else html += `<span class="disabled"><i class="fas fa-chevron-left"></i></span>`;
    if (page > 3) { html += `<a href="#" onclick="goPage(1);return false">1</a>`; if (page > 4) html += `<span class="dots">…</span>`; }
    for (let p = Math.max(1, page-2); p <= Math.min(pages, page+2); p++) {
      html += p === page ? `<span class="active">${p}</span>` : `<a href="#" onclick="goPage(${p});return false">${p}</a>`;
    }
    if (page < pages - 2) { if (page < pages - 3) html += `<span class="dots">…</span>`; html += `<a href="#" onclick="goPage(${pages});return false">${pages}</a>`; }
    if (page < pages) html += `<a href="#" onclick="goPage(${page+1});return false"><i class="fas fa-chevron-right"></i></a>`;
    else html += `<span class="disabled"><i class="fas fa-chevron-right"></i></span>`;
    pag.innerHTML = html;
  }

  function goPage(p) {
    currentPage = p;
    syncFiltersToURL(buildFilters());
    loadListings();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Alert ─────────────────────────────────────────────────
  function saveSearchAlert() {
    if (!Auth.isLoggedIn()) { window.location.href = 'login.html?redirect=' + encodeURIComponent(location.href); return; }
    document.getElementById('alert-label').value = currentCat ? currentCat.name_fr : 'Recherche';
    openModal('alert-modal');
  }
  async function confirmSaveAlert() {
    const label = document.getElementById('alert-label').value.trim();
    const notifyEmail = document.getElementById('alert-email').checked;
    const filters = buildFilters();
    delete filters.page; delete filters.limit; delete filters.sort;
    try {
      await AlertsAPI.create({ label: label || 'Mon alerte', filters, notify_email: notifyEmail });
      closeModal('alert-modal');
      showToast('Alerte créée !', 'success');
    } catch { showToast('Erreur.', 'error'); }
  }

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    const slug = urlParams.get('slug') || urlParams.get('category');
    if (slug) {
      try {
        currentCat = await CategoriesAPI.get(slug);
        document.getElementById('page-title').textContent = currentCat.name_fr;
        document.getElementById('page-title-bc').textContent = currentCat.name_fr;
        document.title = `${currentCat.name_fr} — Pro Market Algérie`;
        if (currentCat.filters?.length) {
          const dynContainer = document.getElementById('dynamic-filters-drawer');
          dynContainer.innerHTML = `<div style="border-top:1px solid var(--gray-200);margin:16px 0;padding-top:16px"><strong style="font-size:12px;color:var(--gray-500);text-transform:uppercase">Filtres spécifiques</strong></div>` +
            currentCat.filters.map(f => {
              if (f.type === 'select') return `<div class="filter-group"><label>${escapeHtml(f.label_fr)}</label><select class="form-control" data-attr-key="${f.key}" onchange="applyFilters()"><option value="">Tous</option>${f.options.map(o=>`<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('')}</select></div>`;
              if (f.type === 'number') return `<div class="filter-group"><label>${escapeHtml(f.label_fr)}</label><input type="number" class="form-control" data-attr-key="${f.key}" placeholder="${escapeHtml(f.label_fr)}" oninput="debounceFilter()"></div>`;
              if (f.type === 'boolean') return `<div class="filter-group"><label class="filter-radio-label"><input type="checkbox" data-attr-key="${f.key}" onchange="applyFilters()"><span class="filter-radio-custom checkbox"></span><span>${escapeHtml(f.label_fr)}</span></label></div>`;
              return `<div class="filter-group"><label>${escapeHtml(f.label_fr)}</label><input type="text" class="form-control" data-attr-key="${f.key}" placeholder="${escapeHtml(f.label_fr)}" oninput="debounceFilter()"></div>`;
            }).join('');
        }
      } catch {}
    }
    applyURLFiltersToInputs();
    renderActiveChips(buildFilters());
    loadListings();
    document.getElementById('f-q')?.addEventListener('input', updateClearButtons);
  }

  init();
</script>
</body>
</html>
